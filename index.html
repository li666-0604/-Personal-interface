<html lang="zh-CN">

  <title>个人名片 - 晓黎</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: '微软雅黑';
}

ul,
li {
  list-style: none;
}

a {
  text-decoration: none;
}

input,
button {
  outline: none;
}

    body {
      width: 100%;
      min-height: 100vh;
      background-color: #0f172a;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .header {
      text-align: center;
    }

    .Avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #5DADE2;
      box-shadow: 0 0 20px rgba(93, 173, 226, 0.3);
      object-fit: cover;
    }

    .main .name {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      margin-top: 16px;
    }

    .main .desc {
      margin-top: 16px;
      text-align: center;
    }

    .main .desc span {
      font-size: 12px;
      font-weight: 400;
      color: #5DADE2;
      background-color: rgba(93, 173, 226, 0.15);
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 0 1px rgba(93, 173, 226, 0.3);
      margin: 4px 6px;
    }

    .main .desc2 {
      text-align: center;
      line-height: 1.6;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 24px;
    }

    .desc3 {
      margin-top: 24px;
      text-align: center;
    }

    .desc3 .title {
      font-size: 12px;
      font-weight: 400;
      color: #64748b;
      text-align: center;
      margin-bottom: 12px;
    }

    .desc3 .tag-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .desc3 .tag {
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .footer .contact-btn {
      width: 200px;
      font-size: 16px;
      padding: 12px 0;
      color: #5DADE2;
      border-radius: 25px;
      border: 2px solid #5DADE2;
      transition: all 0.3s;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
    }

    .footer .contact-btn:hover {
      background-color: #5DADE2;
      color: #fff;
    }

    .footer .contact-btn2 {
      margin-top: 20px;
      color: #475569;
      font-size: 12px;
    }
  </style>
